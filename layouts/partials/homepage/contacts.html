<section class="contacts">
  <a class="contact"
     href="mailto:{{ .Site.Params.email }}">
    <i class="fas fa-envelope"
       aria-hidden="true"></i>
  </a>
  <a class="contact"
     href="https://github.com/{{ .Site.Params.github }}">
    <i class="fab fa-github"
       aria-hidden="true"></i>
  </a>
  <a class="contact"
     href="https://gitlab.com/{{ .Site.Params.gitlab }}">
    <i class="fab fa-gitlab"
       aria-hidden="true"></i>
  </a>
  <a class="contact"
     href="https://linkedin.com/in/{{ .Site.Params.linkedin }}">
    <i class="fab fa-linkedin"
       aria-hidden="true"></i>
  </a>
  <a class="contact"
     href="https://twitter.com/{{ .Site.Params.twitter }}">
    <i class="fab fa-twitter"
       aria-hidden="true"></i>
  </a>
</section>
